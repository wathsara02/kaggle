# =============================================================================
# LOCAL TRAINING CONFIG - Ryzen 5 5600G / RX 6700 XT / 32 GB RAM
#
# This config is optimized for reliable local Windows training.
# The RX 6700 XT is an AMD GPU, and standard PyTorch on Windows does not use it
# through CUDA. Use CPU here unless you move to a ROCm-supported Linux setup.
# =============================================================================

seed: 42
device: cpu

model:
  recurrent_type: none
  # Smaller than the T4 config so CPU PPO updates remain practical.
  recurrent_hidden_size: 128
  critic_hidden_size: 128

algo:
  lr: 0.0003
  lr_min: 0.00001
  lr_annealing: true
  clip_range: 0.2
  entropy_coef: 0.04
  entropy_coef_end: 0.008
  value_coef: 0.5
  gae_lambda: 0.95
  gamma: 0.99
  batch_size: 1024
  ppo_epochs: 4
  max_grad_norm: 0.5
  # Keep some rule-agent exposure, but enough self-play to avoid overfitting.
  rule_mix_prob: 0.35

training:
  # Local CPU training is much slower than Kaggle T4. Use this as a practical
  # local baseline, then resume/add more episodes if the curve is improving.
  episodes: 1750000
  # Ryzen 5 5600G has 6 cores / 12 threads. Six env workers is a good first try.
  num_envs: 6
  exp_name: local_5600g
  log_interval: 1000
  checkpoint_interval: 5000

reward_shaping:
  enabled: true
  illegal_action_penalty: -0.1
  overplay_penalty: -0.22
  trick_reward: 0.04
  cap_bonus: 0.4
  cap_penalty: -0.4
  declarer_bonus: 0.05
  trump_quality_bonus: 0.12
  declarer_team_win_bonus: 0.2
  declarer_team_loss_penalty: -0.2
  late_trick_reward: 0.03
  trump_cut_reward: 0.02
  wasted_trump_penalty: -0.15
  partner_save_reward: 0.08

logging:
  record_matches: true
  record_every: 100
  max_recorded_matches: 3000

eval:
  episodes: 1000
  baseline: rule
  deterministic: true
  during_training:
    enabled: true
    # Save a snapshot and start a separate baseline eval every 10,000 episodes.
    interval_episodes: 10000
    episodes: 1000
    baseline: rule
    deterministic: true
    device: cpu
    max_parallel: 1
    record_match_traces: false
    keep_eval_weights: true
    wait_on_finish: false

export:
  output_dir: artifacts
