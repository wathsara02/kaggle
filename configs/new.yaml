# Main local CPU training config.
seed: 42
device: cpu

model:
  recurrent_type: none
  recurrent_hidden_size: 128
  critic_hidden_size: 128

algo:
  lr: 0.0003
  lr_min: 0.00001
  lr_annealing: true
  clip_range: 0.2
  entropy_coef: 0.04
  entropy_coef_end: 0.008
  value_coef: 0.5
  gae_lambda: 0.95
  gamma: 0.99
  batch_size: 1024
  ppo_epochs: 4
  max_grad_norm: 0.5
  rule_mix_prob: 0.35

training:
  episodes: 1750000
  num_envs: 6
  exp_name: local_5600g
  log_interval: 1000
  checkpoint_interval: 5000

reward_shaping:
  enabled: true
  illegal_action_penalty: -0.1
  overplay_penalty: -0.22
  trick_reward: 0.04
  cap_bonus: 0.4
  cap_penalty: -0.4
  declarer_bonus: 0.05
  trump_quality_bonus: 0.12
  declarer_team_win_bonus: 0.2
  declarer_team_loss_penalty: -0.2
  late_trick_reward: 0.03
  trump_cut_reward: 0.02
  wasted_trump_penalty: -0.15
  partner_save_reward: 0.08

logging:
  record_matches: true
  record_every: 100
  max_recorded_matches: 3000

eval:
  episodes: 1000
  baseline: rule
  deterministic: true
  during_training:
    enabled: true
    interval_episodes: 10000
    episodes: 1000
    baseline: rule
    deterministic: true
    device: cpu
    max_parallel: 1
    record_match_traces: false
    keep_eval_weights: true
    wait_on_finish: false

export:
  output_dir: artifacts
