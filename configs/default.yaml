# Base CUDA training config.
seed: 42
device: cuda

model:
  recurrent_hidden_size: 256
  recurrent_type: none
  critic_hidden_size: 256

algo:
  lr: 0.0003
  lr_min: 0.00001
  lr_annealing: true
  clip_range: 0.2
  entropy_coef: 0.05
  entropy_coef_end: 0.01
  value_coef: 0.5
  gae_lambda: 0.95
  gamma: 0.99
  batch_size: 4096
  ppo_epochs: 8
  max_grad_norm: 0.5
  rule_mix_prob: 0.5

training:
  episodes: 5000000
  num_envs: 32
  exp_name: kaggle_run
  log_interval: 5000
  checkpoint_interval: 25000

reward_shaping:
  enabled: true
  illegal_action_penalty: -0.1
  overplay_penalty: -0.2
  trick_reward: 0.05
  cap_bonus: 0.5
  declarer_bonus: 0.1
  cap_penalty: -0.5
  trump_quality_bonus: 0.2

eval:
  episodes: 200
  baseline: rule
  deterministic: true
  during_training:
    enabled: false
    interval_episodes: 10000
    episodes: 200
    baseline: rule
    deterministic: true
    device: cpu
    max_parallel: 1
    record_match_traces: false
    keep_eval_weights: true
    wait_on_finish: false

export:
  output_dir: artifacts
